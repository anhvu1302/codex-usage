# Repo-local Codex configuration for the trusted Codex Usage repository.
# Keep personal provider/auth/telemetry settings in ~/.codex, not here.

personality = "friendly"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "medium"
approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536

[features]
hooks = true

# The main thread does not receive CodeGraph. The read-only explorer role
# enables only codegraph_explore for bounded unfamiliar-code mapping.
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp", "--path", "/Users/VanAnh/WorkSpace/Personal/codex-usage"]
enabled = false

[agents]
# Keep routing bounded to one selected search role and one impact review.
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Fast read-only Codex Usage search for routine bounded lookup."
config_file = "./agents/explorer.toml"
nickname_candidates = ["Scout", "Mapper"]

[agents.explorer_deep]
description = "High-confidence read-only Codex Usage search for ambiguous or high-risk traces."
config_file = "./agents/explorer-deep.toml"
nickname_candidates = ["Tracer", "Pathfinder"]

[agents.repo_impact]
description = "Read-only Codex Usage cross-layer impact review for contracts, SQLite, importer, retention, privacy, and UI risk."
config_file = "./agents/repo-impact.toml"
nickname_candidates = ["Impact", "Review"]

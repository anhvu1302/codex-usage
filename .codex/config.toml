# Repo-local Codex configuration for the trusted Codex Usage repository.
# Keep personal provider/auth/telemetry settings in ~/.codex, not here.

personality = "friendly"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "medium"
approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536

[features]
hooks = true

# The main thread does not receive CodeGraph. The read-only explorer role
# enables only codegraph_explore for bounded unfamiliar-code mapping.
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp", "--path", "/Users/VanAnh/WorkSpace/Personal/codex-usage"]
enabled = false

[agents]
max_threads = 6
max_depth = 1
